{% extends "base.html" %}
{% block title %}Manage Course Fees - Ceilufas{% endblock %}
{% block content %}
<div class="mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-cash-stack me-2"></i>Manage Course Fees</h2>
        <a href="{{ url_for('admin.create_course_fee') }}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add Course Fee</a>
    </div>
    <div id="courseFeesGrid" style="height: 500px; width: 100%;"></div>
</div>

<!-- Hidden delete forms -->
{% for fee in course_fees %}
<form id="delete-course-fee-{{ fee.id }}" action="{{ url_for('admin.delete_course_fee', course_fee_id=fee.id) }}" method="POST" class="d-none">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
</form>
{% endfor %}
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    const rowData = [
        {% for fee in course_fees %}
        {
            id: {{ fee.id }},
            profession: "{{ fee.profession.name }}",
            course: "{{ fee.course.name }}",
            fee_value: {{ fee.fee_value or 0 }}
        }{{ "," if not loop.last }}
        {% endfor %}
    ];

    const gridOptions = {
        theme: agGrid.themeAlpine,
        columnDefs: [
            { field: 'id', headerName: 'ID', width: 80, sortable: true, filter: true },
            { field: 'profession', headerName: 'Profession', flex: 1, sortable: true, filter: true },
            { field: 'course', headerName: 'Course', flex: 1, sortable: true, filter: true },
            {
                field: 'fee_value',
                headerName: 'Fee Value',
                width: 150,
                sortable: true,
                filter: true,
                valueFormatter: params => params.value.toFixed(2) + ' DZD'
            },
            {
                headerName: 'Actions', width: 160, sortable: false, filter: false,
                cellRenderer: function (params) {
                    let html = '<a href="/admin/course-fees/' + params.data.id + '/edit" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i> Edit</a>';
                    html += '<button class="btn btn-sm btn-outline-danger" onclick="if(confirm(\'Delete this course fee?\'))document.getElementById(\'delete-course-fee-\' + params.data.id).submit()"><i class="bi bi-trash"></i></button>';
                    return html;
                }
            }
        ],
        rowData: rowData,
        defaultColDef: {
            resizable: true
        },
        domLayout: 'autoHeight',
        pagination: true,
        paginationPageSize: 15
    };

    const gridDiv = document.querySelector('#courseFeesGrid');
    agGrid.createGrid(gridDiv, gridOptions);
});
</script>
{% endblock %}
