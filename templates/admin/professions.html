{% extends "base.html" %}
{% block title %}Manage Professions - Ceilufas{% endblock %}
{% block content %}
<div class="mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-briefcase me-2"></i>Manage Professions</h2>
        <a href="{{ url_for('admin.create_profession') }}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add Profession</a>
    </div>
    <div id="professionsGrid" style="height: 500px; width: 100%;"></div>
</div>

<!-- Hidden delete forms -->
{% for profession in professions %}
<form id="delete-profession-{{ profession.id }}" action="{{ url_for('admin.delete_profession', profession_id=profession.id) }}" method="POST" class="d-none">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
</form>
{% endfor %}
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    const rowData = [
        {% for profession in professions %}
        {
            id: {{ profession.id }},
            name: "{{ profession.name }}",
            name_ar: "{{ profession.name_ar }}",
            fee_value: {{ profession.fee_value or 0 }}
        }{{ "," if not loop.last }}
        {% endfor %}
    ];

    const gridOptions = {
        theme: agGrid.themeAlpine,
        columnDefs: [
            { field: 'id', headerName: 'ID', width: 80, sortable: true, filter: true },
            { field: 'name', headerName: 'Name', flex: 1, sortable: true, filter: true },
            { field: 'name_ar', headerName: 'Name (Arabic)', flex: 1, sortable: true, filter: true },
            { 
                field: 'fee_value', 
                headerName: 'Fee Value', 
                width: 150, 
                sortable: true, 
                filter: true,
                valueFormatter: params => params.value.toFixed(2) + ' DZD'
            },
            {
                headerName: 'Actions', width: 160, sortable: false, filter: false,
                cellRenderer: function (params) {
                    let html = '<a href="/admin/professions/' + params.data.id + '/edit" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i> Edit</a>';
                    html += '<button class="btn btn-sm btn-outline-danger" onclick="if(confirm(\'Delete this profession?\'))document.getElementById(\'delete-profession-\' + params.data.id).submit()"><i class="bi bi-trash"></i></button>';
                    return html;
                }
            }
        ],
        rowData: rowData,
        defaultColDef: {
            resizable: true
        },
        domLayout: 'autoHeight',
        pagination: true,
        paginationPageSize: 15
    };

    const gridDiv = document.querySelector('#professionsGrid');
    agGrid.createGrid(gridDiv, gridOptions);
});
</script>
{% endblock %}
