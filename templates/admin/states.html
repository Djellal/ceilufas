{% extends "base.html" %}
{% block title %}Manage States - Ceilufas{% endblock %}
{% block content %}
<div class="mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-geo-alt me-2"></i>Manage States</h2>
        <a href="{{ url_for('admin.create_state') }}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add State</a>
    </div>
    <div id="statesGrid" style="height: 500px; width: 100%;"></div>
</div>

<!-- Hidden delete forms -->
{% for state in states %}
<form id="delete-state-{{ state.id }}" action="{{ url_for('admin.delete_state', state_id=state.id) }}" method="POST" class="d-none">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
</form>
{% endfor %}
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    const rowData = [
        {% for state in states %}
        {
            id: "{{ state.id }}",
            name: "{{ state.name }}",
            name_ar: "{{ state.name_ar }}",
            municipality_count: {{ state.municipalities|length }}
        }{{ "," if not loop.last }}
        {% endfor %}
    ];

    const gridOptions = {
        theme: agGrid.themeAlpine,
        columnDefs: [
            { field: 'id', headerName: 'Code', width: 100, sortable: true, filter: true },
            { field: 'name', headerName: 'Name', flex: 1, sortable: true, filter: true },
            { field: 'name_ar', headerName: 'Name (Arabic)', flex: 1, sortable: true, filter: true },
            {
                field: 'municipality_count', headerName: 'Municipalities', width: 140, sortable: true, filter: true,
                cellRenderer: function (params) {
                    return '<span class="badge bg-secondary">' + params.value + '</span>';
                }
            },
            {
                headerName: 'Actions', width: 160, sortable: false, filter: false,
                cellRenderer: function (params) {
                    return '<a href="/admin/states/' + params.data.id + '/edit" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i> Edit</a>' +
                           '<button class="btn btn-sm btn-outline-danger" onclick="if(confirm(\'Delete this state?\'))document.getElementById(\'delete-state-' + params.data.id + '\').submit()"><i class="bi bi-trash"></i></button>';
                }
            }
        ],
        rowData: rowData,
        defaultColDef: {
            resizable: true
        },
        domLayout: 'autoHeight',
        pagination: true,
        paginationPageSize: 20
    };

    const gridDiv = document.querySelector('#statesGrid');
    agGrid.createGrid(gridDiv, gridOptions);
});
</script>
{% endblock %}
